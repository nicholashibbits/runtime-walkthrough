<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Runtime Walkthrough</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <header class="header">
    <h1>JS Runtime Walkthrough</h1>
    <p>pick an interview question and watch it flow through the runtime</p>
  </header>

  <!-- INPUT VIEW -->
  <example-selector id="inputView"></example-selector>

  <!-- VISUALIZATION VIEW -->
  <div id="vizView" class="viz-view" style="display: none;">
    <div class="main-grid">
      <code-panel></code-panel>

      <div class="runtime-area">
        <call-stack></call-stack>
        <memory-heap></memory-heap>
        <web-apis></web-apis>
        <event-loop></event-loop>
        <microtask-queue></microtask-queue>
        <task-queue></task-queue>
        <console-output></console-output>
        <narration-bar></narration-bar>
        <playback-controls></playback-controls>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
